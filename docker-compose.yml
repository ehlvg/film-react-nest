services:
  backend:
    build: ./backend
    image: ghcr.io/ehlvg/film-backend:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
    networks:
      - film-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_CDN_URL: ${VITE_CDN_URL}
    image: ghcr.io/ehlvg/film-frontend:latest
    restart: unless-stopped
    networks:
      - film-network
    volumes:
      - frontend_dist:/usr/share/nginx/html

  nginx:
    build: ./nginx
    image: ghcr.io/ehlvg/film-nginx:latest
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
    depends_on:
      - backend
      - frontend
    networks:
      - film-network
    volumes:
      - frontend_dist:/usr/share/nginx/html

  database:
    image: postgres:16-alpine
    container_name: postgres_container
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - film-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - '8080:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - film-network
    depends_on:
      - database

volumes:
  postgres_data:
  pgadmin_data:
  frontend_dist:

networks:
  film-network:
    driver: bridge